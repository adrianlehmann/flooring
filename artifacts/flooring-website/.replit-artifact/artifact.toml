kind = "web"
previewPath = "/"
title = "3 Monkeys Floor Installation"
version = "1.0.0"
id = "artifacts/flooring-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20218

[services.development]
run = "pnpm --filter @workspace/flooring-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flooring-website", "run", "build" ]
publicDir = "artifacts/flooring-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20218"
BASE_PATH = "/"
